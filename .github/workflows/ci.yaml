name: ci
on:
  pull_request:
  push:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      BATON_LOG_LEVEL: debug
      BATON_API_LOGIN: test-login
      BATON_API_TRANS_KEY: test-trans-key
      BATON_PROVIDER_ID: test-provider-id
      BATON_BASE_URL: http://localhost:8765
      CONNECTOR_ENTITLEMENT: 'group:group-01:member'
      CONNECTOR_PRINCIPAL: 'acc-prn-005'
      CONNECTOR_PRINCIPAL_TYPE: 'user'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
      - name: Build baton-galileo-ft
        run: go build ./cmd/baton-galileo-ft
      - name: Start test server
        run: go run ./cmd/test-server/ &
      - name: Wait for test server
        run: |
          for i in $(seq 1 30); do
            curl -sf -X POST http://localhost:8765/intserv/4.0/ping \
              -d 'apiLogin=test-login&apiTransKey=test-trans-key&providerId=test-provider-id' && break
            sleep 1
          done
      - name: Run baton-galileo-ft
        run: ./baton-galileo-ft
      - name: Grant/revoke
        uses: ConductorOne/github-workflows/actions/sync-test@v4
        with:
          connector: ./baton-galileo-ft
          baton-entitlement: ${{ env.CONNECTOR_ENTITLEMENT }}
          baton-principal: ${{ env.CONNECTOR_PRINCIPAL }}
          baton-principal-type: ${{ env.CONNECTOR_PRINCIPAL_TYPE }}
